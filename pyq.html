<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeCrack | Previous Year Paper</title>
  <link rel="icon" href="/images/cc-3.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="pyq">
  <div class="app-shell">
    <header class="site-header" id="siteHeader"></header>
    <div class="layout">
      <aside class="site-sidebar" id="siteSidebar"></aside>
      <main class="page-content">
        <h1 class="page-title">Previous Year Papers</h1>
        <p class="page-subtitle">Filter by subject and year. Each paper opens in-browser and can be downloaded as PDF.</p>

        <section class="filter-bar" aria-label="PYQ filters">
          <input id="pyqSubjectFilter" type="text" placeholder="Filter by subject">
          <input id="pyqYearFilter" type="number" min="2000" max="2100" placeholder="Year">
          <input id="pyqSemesterFilter" type="number" min="1" max="12" placeholder="Semester">
          <button id="pyqClearFilters" class="action-btn" type="button">Clear</button>
        </section>

        <div class="table-like" id="pyqTable">
          <article class="table-row">
            <div>
              <strong>Loading previous year papers...</strong>
              <small>Please wait while data is fetched.</small>
            </div>
            <span class="action-btn" aria-hidden="true">Open PDF</span>
            <span class="action-btn" aria-hidden="true">Download</span>
          </article>
        </div>
      </main>
    </div>
    <footer class="site-footer" id="siteFooter"></footer>
  </div>

  <div class="search-modal" id="searchModal" hidden>
    <div class="search-panel">
      <div class="search-head">
        <label class="sr-only" for="searchInput">Search pages</label>
        <input id="searchInput" type="search" placeholder="Search pages, notes, or tools">
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="search-head"><button class="action-btn" type="button" data-close-search>Close</button></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
