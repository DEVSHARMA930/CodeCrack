<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeCrack | Contact Us</title>
  <link rel="icon" href="/images/cc-3.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="contact">
  <div class="app-shell">
    <header class="site-header" id="siteHeader"></header>
    <div class="layout">
      <aside class="site-sidebar" id="siteSidebar"></aside>
      <main class="page-content">
        <h1 class="page-title">Contact Us</h1>
        <p class="page-subtitle">Share bugs, missing notes, or feature ideas and we will prioritize updates.</p>

        <section class="form-shell">
          <h2 style="margin:0;">Reach the team</h2>
          <p style="margin:0;color:var(--text-secondary);">Email: support@codecrack.local</p>
          <p style="margin:0;color:var(--text-secondary);">Response window: within 48 hours for verified student requests.</p>
          <p style="margin:0;color:var(--text-secondary);">For urgent login issues, include your registered email and browser details.</p>
        </section>
      </main>
    </div>
    <footer class="site-footer" id="siteFooter"></footer>
  </div>

  <div class="search-modal" id="searchModal" hidden>
    <div class="search-panel">
      <div class="search-head">
        <label class="sr-only" for="searchInput">Search pages</label>
        <input id="searchInput" type="search" placeholder="Search pages, notes, or tools">
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="search-head"><button class="action-btn" type="button" data-close-search>Close</button></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
