<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeCrack | Login</title>
  <link rel="icon" href="/images/cc-3.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="login">
  <div class="app-shell">
    <header class="site-header" id="siteHeader"></header>
    <div class="layout">
      <aside class="site-sidebar" id="siteSidebar"></aside>
      <main class="page-content">
        <h1 class="page-title">Login and Register</h1>
        <p class="page-subtitle">Sign in to keep your session with HttpOnly cookies and access protected student features.</p>

        <section class="grid">
          <article class="form-shell">
            <h2 style="margin:0;">Login</h2>
            <form data-login-form>
              <label>Email</label>
              <input type="email" name="email" required>
              <label>Password</label>
              <input type="password" name="password" minlength="8" required>
              <button class="action-btn primary" type="submit">Login</button>
              <p class="form-message" data-form-message></p>
            </form>
          </article>

          <article class="form-shell">
            <h2 style="margin:0;">Create account</h2>
            <form data-register-form>
              <label>Name</label>
              <input type="text" name="name" maxlength="80" required>
              <label>Email</label>
              <input type="email" name="email" required>
              <label>Password</label>
              <input type="password" name="password" minlength="8" required>
              <button class="action-btn primary" type="submit">Register</button>
              <p class="form-message" data-form-message></p>
            </form>
          </article>
        </section>
      </main>
    </div>
    <footer class="site-footer" id="siteFooter"></footer>
  </div>

  <div class="search-modal" id="searchModal" hidden>
    <div class="search-panel">
      <div class="search-head">
        <label class="sr-only" for="searchInput">Search pages</label>
        <input id="searchInput" type="search" placeholder="Search pages, notes, or tools">
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="search-head"><button class="action-btn" type="button" data-close-search>Close</button></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
